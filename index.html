<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0"><style>
body{
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont;
  background:linear-gradient(135deg,#0f0018,#ff6a00);
  color:white;
  display:flex;
  flex-direction:column;
  height:100vh;
  overflow:hidden;
}

/* GRID */
#grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:14px;
  padding:14px;
}

/* FLOAT ANIMATION */
@keyframes float{
  0%{transform:translateY(0);}
  50%{transform:translateY(-8px);}
  100%{transform:translateY(0);}
}

/* ICON STYLE */
.grid-btn{
  height:72px;
  border-radius:50%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(12px);
  box-shadow:0 6px 20px rgba(0,0,0,0.6);
  font-size:20px;
  animation:float 3s ease-in-out infinite;
}

.grid-btn span{
  font-size:10px;
}

/* CHAT */
#chat{
  flex:1;
  overflow:auto;
  padding:12px;
}

.msg{
  margin:10px;
  padding:14px;
  border-radius:16px;
  max-width:85%;
}

.user{
  background:#ff6a00;
  margin-left:auto;
}

.ai{
  background:rgba(0,0,0,0.6);
}

img,video{
  width:100%;
  border-radius:10px;
  margin-top:6px;
}

/* INPUT */
#bottom{
  display:flex;
  padding:10px;
  background:rgba(0,0,0,0.4);
}

#bottom input{
  flex:1;
  padding:14px;
  border:none;
  border-radius:14px;
}

#bottom button{
  margin-left:6px;
  padding:14px;
  border:none;
  border-radius:14px;
  background:#ff6a00;
  color:white;
}
</style></head><body><!-- GRID --><div id="grid">
  <div class="grid-btn" onclick="setMode('chat')">💬<span>Chat</span></div>
  <div class="grid-btn" onclick="setMode('story')">📖<span>Story</span></div>
  <div class="grid-btn" onclick="setMode('image')">🖼<span>Image</span></div>
  <div class="grid-btn" onclick="setMode('video')">🎬<span>Video</span></div>  <div class="grid-btn" onclick="template('funny')">😂<span>Funny</span></div>
  <div class="grid-btn" onclick="template('sad')">💔<span>Sad</span></div>
  <div class="grid-btn" onclick="template('anime')">🔥<span>Anime</span></div>
  <div class="grid-btn" onclick="template('money')">💰<span>Money</span></div>  <div class="grid-btn" onclick="toggleTikTok()">🚀<span>TikTok</span></div>
</div><div id="chat"></div><div id="bottom">
  <input id="input" placeholder="Ask anything...">
  <button onclick="send()">➤</button>
  <button onclick="voice()">🎤</button>
</div><script>

let mode="chat";
let tiktok=false;

// ADD MESSAGE
function add(text,type){
  let chat=document.getElementById("chat");
  let div=document.createElement("div");
  div.className="msg "+type;
  div.innerHTML=text;
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

// MODE
function setMode(m){
  mode=m;
  add("Mode: "+m,"ai");
}

// TEMPLATE
function template(type){
  if(type==="funny"){
    input.value="Funny story about a crazy situation";
    mode="story";
  }
  if(type==="sad"){
    input.value="Sad emotional story about heartbreak";
    mode="story";
  }
  if(type==="anime"){
    input.value="Epic anime battle with powers";
    mode="story";
  }
  if(type==="money"){
    input.value="How to make money online";
    mode="chat";
  }
  send();
}

// TIKTOK
function toggleTikTok(){
  tiktok=!tiktok;
  add("TikTok Mode: "+(tiktok?"ON 🔥":"OFF"),"ai");
}

// VOICE INPUT
function voice(){
  let rec=new (window.SpeechRecognition||window.webkitSpeechRecognition)();
  rec.lang="en-US";

  rec.onresult=e=>{
    input.value=e.results[0][0].transcript;
    send();
  };

  rec.start();
}

// SPEAK
function speak(text){
  let s=new SpeechSynthesisUtterance(text);
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(s);
}

// DOWNLOAD
function download(url,name){
  let a=document.createElement("a");
  a.href=url;
  a.download=name;
  a.click();
}

// LONG STORY (FIXED)
function storyGen(topic){
  return `
📖 STORY

In a world where ${topic}, everything started to change.

At first, nobody noticed anything unusual. Life continued as normal.

But slowly, strange events began happening. People started questioning reality.

Fear spread, confusion grew, and everything became uncertain.

Then came the turning point.

One bold decision changed everything.

Through struggle, pain, and determination, a new path was created.

Strength replaced fear.

Vision replaced doubt.

And in the end…

✨ A new beginning was born.
`;
}

// SEND
function send(){
  let txt=input.value.trim();
  if(!txt) return;

  add(txt,"user");

  // IMAGE
  if(mode==="image"){
    let url="https://image.pollinations.ai/prompt/"+encodeURIComponent(txt);
    add(`<img src="${url}"><button onclick="download('${url}','image.jpg')">⬇ Download</button>`,"ai");
    speak("Image ready");
    return;
  }

  // VIDEO
  if(mode==="video"){
    let vid="https://samplelib.com/lib/preview/mp4/sample-5s.mp4";
    add(`<video controls src="${vid}"></video>
    🎬 ${txt}
    🔥 Viral caption: "${txt} 😳"
    <button onclick="download('${vid}','video.mp4')">⬇ Download</button>`,"ai");
    speak("Video ready");
    return;
  }

  // STORY
  if(mode==="story"){
    let s=storyGen(txt);
    if(tiktok){
      s+="\n🔥 This will go viral #fyp";
    }
    add(s,"ai");
    speak("Story ready");
    return;
  }

  // CHAT
  let reply="🤖 "+txt+" — Think bigger, act smarter, stay consistent.";
  add(reply,"ai");
  speak(reply);
}

</script></body>
</html>
